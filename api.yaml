openapi: 3.0.3
info:
  title: MOVA DApp 完整后端 API
  version: 1.0.0
  description: 提供质押、团队、业绩、奖励等DApp核心功能的查询接口。所有金额字段均为字符串格式的Wei单位。
servers:
  - url: http://35.78.236.133/mova
# =========== HomeView.jsx 中的接口 =====================
paths:
  # ========== 系统相关接口 ==========
  /api/stats/stake:
    get:
      summary: 获取全局质押统计
      tags:
        - 系统
      responses:
        '200':
          description: 成功获取全局质押数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalStakeStatsResponse'


  # ========== 网体（用户与团队）相关接口 ==========
  /api/user/{address}:
    get:
      summary: 获取用户完整信息
      tags:
        - 网体
      parameters:
        - name: address
          in: path
          required: true
          description: 用户钱包地址
          schema:
            type: string
      responses:
        '200':
          description: 成功获取用户详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'

  /api/user/{address}/today:
    get:
      summary: 获取用户今日新增质押
      tags:
        - 网体
      parameters:
        - name: address
          in: path
          required: true
          description: 用户钱包地址
          schema:
            type: string
      responses:
        '200':
          description: 成功获取今日新增
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayStakeResponse'

  /api/team/{address}:
    get:
      summary: 获取用户网体信息（直推与团队计数）
      tags:
        - 网体
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功获取网体计数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamNetworkResponse'

  /api/team/{address}/hierarchy:
    get:
      summary: 获取用户团队层级详情
      tags:
        - 网体
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功获取团队层级详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamHierarchyResponse'

  /api/team/{address}/ancestors:
    get:
      summary: 获取用户上级链
      tags:
        - 网体
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功获取上级链
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AncestorChainResponse'

  /api/users:
    get:
      summary: 获取全部会员列表（分页）
      tags:
        - 网体
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            format: int64
        - name: page_size
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功获取分页会员列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembersResponse'

  # ========== 质押相关接口 ==========
  /api/stakes/{address}:
    get:
      summary: 获取用户质押记录
      tags:
        - 质押
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功获取质押记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StakesResponse'

  /api/unstakes/{address}:
    get:
      summary: 获取用户解质押记录
      tags:
        - 质押
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功获取解质押记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnstakesResponse'

  # ========== 以下为之前已定义的业绩与奖励接口 ==========
  /api/performance/{address}:
    get:
      summary: 获取用户业绩详情
      tags:
        - 业绩
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceResponse'
  # ... （此处应插入之前文档中已定义的所有业绩与奖励接口路径，如 /api/performance/ranking, /api/levels, /api/rewards/{address} 等）
  # 为保持简洁，这里用注释表示，实际完整文档应包含所有路径。

components:
  schemas:
    # ========== 新接口的 Schema 定义 ==========
    GlobalStakeStatsResponse:
      type: object
      properties:
        success:
          type: boolean
        current_stake:
          type: string
          description: 当前有效质押总量（质押-解押，Wei）
        stake_30d:
          type: string
          description: 30天新增质押（Wei）
        unstake_30d:
          type: string
          description: 30天解押量（Wei）
        stake_1d:
          type: string
          description: 1天新增质押（Wei）
        unstake_1d:
          type: string
          description: 1天解押量（Wei）
        error:
          type: string

    UserDetailResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            address:
              type: string
            referrer:
              type: string
            team_level:
              type: integer
              description: '0=普通，1-6=S1-S6'
            team_level_name:
              type: string
            personal_performance:
              type: string
            team_performance:
              type: string
            direct_performance:
              type: string
            big_area_performance:
              type: string
            small_area_performance:
              type: string
            direct_count:
              type: integer
            valid_direct_count:
              type: integer
            team_count:
              type: integer
            is_valid_user:
              type: boolean

    TodayStakeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            address:
              type: string
            today_personal_stake:
              type: string
              description: 今日个人新增质押 (Wei)
            today_team_stake:
              type: string
              description: 今日团队新增质押 (Wei)

    TeamNetworkResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            user_info:
              $ref: '#/components/schemas/UserBasicInfo'
            direct_count:
              type: integer
            team_count:
              type: integer

    TeamHierarchyResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            address:
              type: string
            referrer:
              type: string
            depth:
              type: integer
              description: 在推荐树中的深度（0=顶层）
            team_level:
              type: integer
            team_level_name:
              type: string
            personal_performance:
              type: string
            team_performance:
              type: string
            direct_performance:
              type: string
            big_area_performance:
              type: string
            small_area_performance:
              type: string
            direct_count:
              type: integer
            valid_direct_count:
              type: integer
            team_count:
              type: integer
            direct_users:
              type: array
              items:
                $ref: '#/components/schemas/UserBasicInfo'

    AncestorChainResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            ancestors:
              type: array
              items:
                $ref: '#/components/schemas/UserBasicInfo'
            total_depth:
              type: integer

    MembersResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: '#/components/schemas/UserBasicInfo'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer

    StakesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            stakes:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  user_address:
                    type: string
                  amount:
                    type: string
                    description: 质押金额（单位：Wei）
                  stake_index:
                    type: integer
                  stake_time:
                    type: integer
                    description: Unix时间戳（秒）
                  block_number:
                    type: integer
                  tx_hash:
                    type: string

    UnstakesResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            unstakes:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  user_address:
                    type: string
                  reward:
                    type: string
                    description: 解质押获得的奖励（单位：Wei）
                  stake_index:
                    type: integer
                  unstack_time:
                    type: integer
                    description: Unix时间戳（秒）
                  block_number:
                    type: integer
                  tx_hash:
                    type: string

    # ========== 之前已定义的通用 Schema ==========
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string

    UserBasicInfo:
      type: object
      properties:
        address:
          type: string
        referrer:
          type: string
        team_level:
          type: integer
        personal_performance:
          type: string
        team_performance:
          type: string
        direct_performance:
          type: string
        big_area_performance:
          type: string
        small_area_performance:
          type: string
        direct_count:
          type: integer
        valid_direct_count:
          type: integer
        team_count:
          type: integer
        is_valid_user:
          type: boolean
    # ... （此处应插入之前文档中已定义的所有其他Schema，如 PerformanceResponse, RewardRecord 等）
    # 为保持简洁，这里用注释表示，实际完整文档应包含所有定义。